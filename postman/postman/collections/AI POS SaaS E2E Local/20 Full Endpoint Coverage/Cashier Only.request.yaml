$kind: http-request
name: Cashier Only
url: "{{baseUrl}}/api/cashier/only"
method: GET
headers:
  - key: Authorization
    value: Bearer {{cashierToken}}
order: 1100
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Cashier-only endpoint returns 200 for cashier", function () {
        pm.response.to.have.status(200);
      });
