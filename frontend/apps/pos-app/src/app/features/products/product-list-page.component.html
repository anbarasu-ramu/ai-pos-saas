<section class="page">

  <div class="table">

    <!-- 🔹 Header -->
    <div class="row header">
      <div class="cell">Name</div>
      <div class="cell">Category</div>
      <div class="cell">Stock</div>
      <div class="cell">Price</div>

      <div class="cell" *ngIf="showAddToCart">Add</div>

      <ng-container *ngIf="!showAddToCart">
        <div class="cell">Edit</div>
        <div class="cell">Deactivate</div>
      </ng-container>
    </div>

    <!-- 🔹 Rows -->
    <div class="row" *ngFor="let product of products">

      <div class="cell">{{ product.name }}</div>
      <div class="cell">{{ product.category }}</div>
      <div class="cell">{{ product.stockQuantity }}</div>
      <div class="cell">{{ product.price | currency }}</div>

      <!-- Cashier -->
      <div class="cell" *ngIf="showAddToCart">
        <button class="small-btn" (click)="onAddToCart(product)">
          Add to Cart
        </button>
      </div>

      <!-- Admin -->
      <ng-container *ngIf="!showAddToCart">

        <div class="cell">
          <button
            class="small-btn"
            [disabled]="!product.active"
            [class.disabled-btn]="!product.active"
            (click)="onEdit(product)">
            Edit
          </button>
        </div>

        <div class="cell">
          <button
            class="small-btn"
            [class.activate-btn]="!product.active"
            (click)="onToggleActive(product)">
            {{ product.active ? 'Deactivate' : 'Activate' }}
          </button>
        </div>

      </ng-container>

    </div>

  </div>

</section>
