<section class="page">
  <header class="hero">
    <p class="eyebrow">Orders</p>
    <h1>Recent order activity</h1>
    <p class="subcopy">Track completed checkouts and see who created each order.</p>
  </header>

  <ng-container *ngIf="isLoading(); else ordersState">
    <article class="state-card">
      <p>Loading orders...</p>
    </article>
  </ng-container>

  <ng-template #ordersState>
    <ng-container *ngIf="!errorMessage(); else errorState">
      <ng-container *ngIf="orders().length; else emptyState">
        <article class="grid-card">
          <ag-grid-angular
            class="ag-theme-quartz app-grid-theme orders-grid"
            [modules]="modules"
            [rowData]="orders()"
            [columnDefs]="columnDefs"
            [defaultColDef]="defaultColDef"
            [animateRows]="true"
            [suppressCellFocus]="true"
            [headerHeight]="52"
            [rowHeight]="60"
            (gridReady)="onGridReady($event)"
            (firstDataRendered)="onFirstDataRendered($event)"
            (gridSizeChanged)="onGridSizeChanged($event)">
          </ag-grid-angular>

          <footer class="pagination-bar">
            <button
              class="btn"
              type="button"
              [disabled]="!hasPreviousPage() || isLoading()"
              (click)="previousPage()">
              Previous
            </button>

            <div class="pagination-copy">
              <strong>{{ pageLabel() }}</strong>
              <span>{{ resultsLabel() }}</span>
            </div>

            <button
              class="btn"
              type="button"
              [disabled]="!hasNextPage() || isLoading()"
              (click)="nextPage()">
              Next
            </button>
          </footer>
        </article>
      </ng-container>
    </ng-container>
  </ng-template>

  <ng-template #errorState>
    <article class="state-card error">
      <p>{{ errorMessage() }}</p>
      <button class="btn" type="button" (click)="retry()">Retry</button>
    </article>
  </ng-template>

  <ng-template #emptyState>
    <article class="state-card">
      <p>No orders found yet.</p>
    </article>
  </ng-template>
</section>
